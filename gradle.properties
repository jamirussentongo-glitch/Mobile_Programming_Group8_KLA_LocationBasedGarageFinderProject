# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# Increased memory for the Gradle daemon to handle KSP, Hilt, and Room
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Dsun.io.useCanonCaches=false

# Kotlin daemon settings
kotlin.daemon.jvmargs=-Xmx2048m
kotlin.daemon.useFallbackStrategy=true
kotlin.compiler.execution.strategy=daemon

# Performance settings
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX and modern Kotlin settings
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Fix for KSP "Storage for ... is already registered" error
ksp.incremental=false
